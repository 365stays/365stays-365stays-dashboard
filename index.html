// ── Fetch Hostaway live ───────────────────────────────────────────────────────
async function fetchHostawayLive() {
  // Get token
  const tokenResp = await fetch('https://api.hostaway.com/v1/accessTokens', {
    method: 'POST',
    headers: {'Content-Type':'application/x-www-form-urlencoded'},
    body: `grant_type=client_credentials&client_id=${HOSTAWAY_CLIENT_ID}&client_secret=${HOSTAWAY_SECRET}&scope=general`
  });
  const tokenData = await tokenResp.json();
  const token = tokenData.access_token;
  if (!token) throw new Error('No token');

  // Fetch all pages
  let all = [], offset = 0, hasMore = true;
  while (hasMore) {
    const url = `https://api.hostaway.com/v1/reservations?arrivalStartDate=2023-01-01&arrivalEndDate=2026-12-31&limit=100&offset=${offset}&sortOrder=asc&includeResources=1`;
    const resp = await fetch(url, {headers:{Authorization:`Bearer ${token}`,'Cache-control':'no-cache'}});
    const data = await resp.json();
    const result = data.result || [];
    all = all.concat(result);
    hasMore = result.length === 100;
    offset += result.length;
    if (offset > 2000) break; // safety
  }
  return all;
}

function parseHostaway(list) {
  return list
    .filter(r => ['confirmed','modified','new'].includes((r.status||'').toLowerCase()))
    .map(r => ({
      date: r.arrivalDate,
      nights: r.nights || 0,
      amount: parseFloat(r.totalPrice) || 0,
      cleaning: parseFloat(r.cleaningFee) || 0,
      commission: parseFloat(r.channelCommissionAmount || r.airbnbListingHostFee) || Math.round((parseFloat(r.totalPrice)||0)*0.15*100)/100,
      property: r.internalListingName || r.listingName || 'Sin nombre',
      source: 'Hostaway',
      channel: r.channelName || 'direct',
    }));
}

function Delta({current, prev}) {
  if (!prev || prev === 0 || current === 0) return null;
  const pct = ((current - prev) / prev) * 100;
  const up = pct >= 0;
  return h('span', {style:{fontSize:11,fontWeight:700,color:up?C.up:C.down,marginLeft:6}}, (up?'▲':'▼')+Math.abs(pct).toFixed(0)+'%');
}

function MultiSelect({label, options, selected, onChange}) {
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState('');
  const ref = useRef();
  useEffect(() => {
    const h = e => { if(ref.current && !ref.current.contains(e.target)){setOpen(false);setSearch('');} };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);
  const allSel = selected.length === options.length;
  const filtered = options.filter(o => o.toLowerCase().includes(search.toLowerCase()));
  return h('div', {ref, style:{position:'relative'}},
    h('button', {
      onClick: () => setOpen(o => !o),
      style:{background:C.surface,border:`1px solid ${C.border}`,color:C.text,borderRadius:6,padding:'5px 10px',fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',gap:6,minWidth:180}
    },

      h('div', {style:{padding:'8px 10px',borderBottom:`1px solid ${C.border}`}},
        h('input', {
          autoFocus: true,

      },

      ),

    years.forEach(y => {
      const yr = parseInt(y);
      const daysInYear = yr < today.getFullYear() ? 365+(yr%4===0&&(yr%100!==0||yr%400===0)?1:0) : today.getDate()+[...Array(today.getMonth())].reduce((s,_,i)=>s+new Date(yr,i+1,0).getDate(),0);
      totalDays += daysInYear;
    });
    const occ = totalDays > 0 ? Math.min(100,(nights/(totalDays*numProps))*100) : 0;
    return {revenue, nights, count, adr:nights>0?net/nights:0, avg:count>0?revenue/count:0, occ};
  }, [filtered, revenueMode, years, numProps]);

  const byMonth = useMemo(() => {
    const map = {};
    years.forEach(y => { for(let m=1;m<=12;m++){const ym=`${y}-${String(m).padStart(2,'0')}`;map[ym]={month:ym,ingresos:0,noches:0,reservas:0};} });
    filtered.forEach(r => { const ym=toYM(r.date); if(!ym||!map[ym])return; map[ym].ingresos+=rev(r); map[ym].noches+=r.nights; map[ym].reservas+=1; });
    const cmpMap = {};
    for(let m=1;m<=12;m++){const ym=`${compareYear}-${String(m).padStart(2,'0')}`;cmpMap[ym]={ingresos:0,noches:0};}
    filteredCmp.forEach(r => { const ym=toYM(r.date); if(!ym||!cmpMap[ym])return; cmpMap[ym].ingresos+=rev(r); cmpMap[ym].noches+=r.nights; });
    return Object.values(map).sort((a,b)=>a.month.localeCompare(b.month)).map(m => {
      const mn = parseInt(m.month.split('-')[1])-1;
      const yr = m.month.split('-')[0];
      const cmpYM = `${compareYear}-${String(mn+1).padStart(2,'0')}`;
      const cmp = cmpMap[cmpYM] || {ingresos:0,noches:0};
      const daysInMonth = new Date(parseInt(yr),mn+1,0).getDate();
      return {...m, label:MESES[mn]+' '+yr.slice(2), labelFull:MESES_FULL[mn]+' '+yr, cmpIngresos:cmp.ingresos, cmpNoches:cmp.noches, daysInMonth};
    });
  }, [filtered, filteredCmp, years, compareYear, revenueMode]);

  const cmpByMonth = useMemo(() => {
    const map = {};
    for(let m=1;m<=12;m++){const ym=`${compareYear}-${String(m).padStart(2,'0')}`;map[ym]={ingresos:0,noches:0};}
    filteredCmp.forEach(r => { const ym=toYM(r.date); if(!ym||!map[ym])return; map[ym].ingresos+=rev(r); map[ym].noches+=r.nights; });
    return map;
  }, [filteredCmp, compareYear, revenueMode]);

  const chartData = useMemo(() => Array.from({length:12},(_,i) => {
    const row = {label:MESES[i], month:i+1};
    years.forEach(y => {
      const src = byMonth.find(x=>x.month===`${y}-${String(i+1).padStart(2,'0')}`);
      row[`ing_${y}`] = src?.ingresos||0;
      row[`noc_${y}`] = src?.noches||0;
    });
    const cmpYM = `${compareYear}-${String(i+1).padStart(2,'0')}`;
    row.ing_cmp = cmpByMonth[cmpYM]?.ingresos||0;
    row.noc_cmp = cmpByMonth[cmpYM]?.noches||0;
    return row;
  }), [byMonth, cmpByMonth, years, compareYear]);

  const byProp = useMemo(() => {
    const map = {};
    filtered.forEach(r => { if(!map[r.property])map[r.property]={name:r.property,ingresos:0,noches:0,reservas:0}; map[r.property].ingresos+=rev(r); map[r.property].noches+=r.nights; map[r.property].reservas+=1; });
    return Object.values(map).sort((a,b)=>b.ingresos-a.ingresos).map(p=>({...p,adr:p.noches>0?p.ingresos/p.noches:0}));
  }, [filtered, revenueMode]);

  const showCmp = !years.includes(compareYear);
  const yearColor = (_,i) => YEAR_COLORS[i%YEAR_COLORS.length];
  const btn = a => ({padding:'6px 14px',borderRadius:6,fontSize:12,cursor:'pointer',fontWeight:500,background:a?C.accent:'transparent',color:a?'#fff':C.muted,border:`1px solid ${a?C.accent:C.border}`});
  const sel = {background:C.surface,border:`1px solid ${C.border}`,color:C.text,borderRadius:6,padding:'5px 10px',fontSize:12,cursor:'pointer'};

  return h('div', {style:{background:C.bg,minHeight:'100vh',color:C.text,fontFamily:"'Inter',system-ui,sans-serif",padding:24}},

    // Header
    h('div', {style:{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:12}},
      h('div', null,
        h('div', {style:{fontSize:20,fontWeight:700,letterSpacing:'-0.02em'}}, '365stays ',
          h('span', {style:{color:C.muted,fontWeight:400}}, '/ Dashboard')
        ),
        h('div', {style:{fontSize:11,color:C.muted,marginTop:2}}, `${ALL_DATA.length.toLocaleString()} reservas · ${liveStatus||UPDATED}`)
      ),
      h('div', {style:{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}},
        // Revenue mode
        h('div', {style:{display:'flex',border:`1px solid ${C.border}`,borderRadius:6,overflow:'hidden'}},
          ...[['bruto','Bruto'],['neto_comision','Neto'],['neto_total','Neto total']].map(([k,l]) =>
            h('button', {key:k, onClick:()=>setRevenueMode(k), style:{padding:'5px 10px',fontSize:11,cursor:'pointer',fontWeight:500,background:revenueMode===k?C.accent:'transparent',color:revenueMode===k?'#fff':C.muted,border:'none',borderRight:`1px solid ${C.border}`}}, l)
          )
        ),
        // Years
        h('div', {style:{display:'flex',gap:4,alignItems:'center'}},
          h('span', {style:{fontSize:11,color:C.muted}}, 'Ver:'),
          ...allYearsList.map((y,i) =>
            h('button', {key:y, onClick:()=>setYears(p=>p.includes(y)?p.filter(x=>x!==y):[...p,y]),
              style:{...btn(years.includes(y)),borderColor:years.includes(y)?yearColor(y,i):C.border,background:years.includes(y)?yearColor(y,i):'transparent',color:years.includes(y)?'#fff':C.muted,padding:'4px 10px'}
            }, y)
          )
        ),
        // Compare year
        h('div', {style:{display:'flex',gap:4,alignItems:'center'}},
          h('span', {style:{fontSize:11,color:C.muted}}, 'vs:'),
          h('select', {style:sel, value:compareYear, onChange:e=>setCompareYear(e.target.value)},
            ...allYearsList.map(y => h('option', {key:y, value:y}, y))
          )
        ),
        // Properties
        h(MultiSelect, {label:'Propiedades', options:allPropsList, selected:selectedProps, onChange:v=>setProps(v.length===allPropsList.length?null:v)})
      )
    ),

    // KPIs
    h('div', {style:{display:'flex',gap:12,marginBottom:20,flexWrap:'wrap'}},
      h(KPI, {label:`Ingresos (${revLabel})`, value:fmt(kpis.revenue), sub:`${kpis.count} reservas`, color:C.accent}),
      h(KPI, {label:'ADR neto', value:fmt(kpis.adr), sub:'(sin limpieza) / noche', color:C.accent2}),
      h(KPI, {label:'Noches ocupadas', value:kpis.nights.toLocaleString('es-ES'), sub:'total período'}),
      h(KPI, {label:'Ocupación', value:kpis.occ.toFixed(1)+'%', sub:`${numProps} prop · ${years.join(', ')}`, color:C.accent3}),
      h(KPI, {label:'Ticket medio', value:fmt(kpis.avg), sub:revLabel})
    ),

    // Tabs
    h('div', {style:{display:'flex',gap:6,marginBottom:18,flexWrap:'wrap'}},
      ...[['mensual','Por mes'],['graficos','Gráficos'],['propiedades','Propiedades'],['reservas','Reservas']].map(([k,l]) =>
        h('button', {key:k, style:btn(view===k), onClick:()=>setView(k)}, l)
      )
    ),

    // POR MES
    view==='mensual' && h('div', {style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,overflow:'hidden'}},
      h('table', null,
        h('thead', null,
          h('tr', {style:{background:C.bg}},
            ...['Mes','Res.',showCmp?`Noches vs ${compareYear}`:'Noches','Ocup.',showCmp?`${revLabel} vs ${compareYear}`:revLabel,'ADR','Ing/reserva'].map(hd =>
              h('th', {key:hd, style:{padding:'10px 16px',textAlign:'left',color:C.muted,fontWeight:500,borderBottom:`1px solid ${C.border}`,whiteSpace:'nowrap'}}, hd)
            )
          )
        ),
        h('tbody', null,
          ...byMonth.map((m,i) => {
            const empty = m.ingresos===0&&m.noches===0;
            const occPct = m.daysInMonth>0?(m.noches/(m.daysInMonth*numProps))*100:0;
            const cmpOccPct = m.daysInMonth>0?(m.cmpNoches/(m.daysInMonth*numProps))*100:0;
            return h('tr', {key:m.month, style:{borderBottom:`1px solid ${C.border}`,background:i%2===0?'transparent':C.bg,opacity:empty?0.3:1}},
              h('td', {style:{padding:'9px 16px',fontWeight:500}}, m.labelFull),
              h('td', {style:{padding:'9px 16px',color:C.muted}}, m.reservas||'—'),
              h('td', {style:{padding:'9px 16px'}},
                h('span', {style:{color:C.muted}}, m.noches||'—'),
                !empty&&showCmp&&h(Delta, {current:m.noches, prev:m.cmpNoches}),
                !empty&&showCmp&&m.cmpNoches>0&&h('span', {style:{color:C.muted,fontSize:10,marginLeft:4}}, `(${m.cmpNoches})`)
              ),
              h('td', {style:{padding:'9px 16px'}},
                !empty&&h('span', {style:{fontFamily:'monospace',color:C.accent2}}, occPct.toFixed(0)+'%'),
                !empty&&showCmp&&cmpOccPct>0&&h(Delta, {current:occPct, prev:cmpOccPct}),
                !empty&&showCmp&&cmpOccPct>0&&h('span', {style:{color:C.muted,fontSize:10,marginLeft:4}}, `(${cmpOccPct.toFixed(0)}%)`)
              ),
              h('td', {style:{padding:'9px 16px',fontFamily:'monospace'}},
                h('span', {style:{color:C.accent}}, empty?'—':fmt(m.ingresos)),
                !empty&&showCmp&&h(Delta, {current:m.ingresos, prev:m.cmpIngresos}),
                !empty&&showCmp&&m.cmpIngresos>0&&h('span', {style:{color:C.muted,fontSize:10,marginLeft:4}}, `(${fmt(m.cmpIngresos)})`)
              ),
              h('td', {style:{padding:'9px 16px',fontFamily:'monospace'}}, m.noches>0?fmt(m.ingresos/m.noches):'—'),
              h('td', {style:{padding:'9px 16px',fontFamily:'monospace'}}, m.reservas>0?fmt(m.ingresos/m.reservas):'—')
            );
          })
        )
      )
    ),

    // GRÁFICOS
    view==='graficos' && h('div', {style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}},
      h('div', {style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:20,gridColumn:'1/-1'}},
        h('div', {style:{fontSize:11,color:C.muted,marginBottom:12,textTransform:'uppercase',letterSpacing:'0.06em'}}, `${revLabel} mensual${showCmp?` · gris = ${compareYear}`:''}`),
        h(ResponsiveContainer, {width:'100%',height:220},
          h(BarChart, {data:chartData,margin:{top:0,right:0,left:0,bottom:0}},
            h(CartesianGrid, {strokeDasharray:'3 3',stroke:C.border}),
            h(XAxis, {dataKey:'label',tick:{fill:C.muted,fontSize:9},axisLine:false,tickLine:false}),
            h(YAxis, {tick:{fill:C.muted,fontSize:9},axisLine:false,tickLine:false,tickFormatter:v=>v>=1000?`${(v/1000).toFixed(0)}k`:v}),
            h(Tooltip, {content:h(Tip)}),
            h(Legend, {wrapperStyle:{fontSize:10,color:C.muted}}),
            showCmp&&h(Bar, {dataKey:'ing_cmp',name:`${compareYear} (comp.)`,fill:C.muted,opacity:0.35,radius:[3,3,0,0]}),
            ...years.map((y,i) => h(Bar, {key:y,dataKey:`ing_${y}`,name:y,fill:yearColor(y,i),radius:[3,3,0,0]}))
          )
        )
      ),
      h('div', {style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:20}},
        h('div', {style:{fontSize:11,color:C.muted,marginBottom:12,textTransform:'uppercase',letterSpacing:'0.06em'}}, 'Noches / mes'),
        h(ResponsiveContainer, {width:'100%',height:200},
          h(LineChart, {data:chartData,margin:{top:0,right:0,left:0,bottom:0}},
            h(CartesianGrid, {strokeDasharray:'3 3',stroke:C.border}),
            h(XAxis, {dataKey:'label',tick:{fill:C.muted,fontSize:9},axisLine:false,tickLine:false}),
            h(YAxis, {tick:{fill:C.muted,fontSize:9},axisLine:false,tickLine:false}),
            h(Tooltip, {content:h(Tip)}),
            h(Legend, {wrapperStyle:{fontSize:10,color:C.muted}}),
            showCmp&&h(Line, {type:'monotone',dataKey:'noc_cmp',name:`${compareYear} (comp.)`,stroke:C.muted,strokeWidth:1,strokeDasharray:'4 4',dot:false}),
            ...years.map((y,i) => h(Line, {key:y,type:'monotone',dataKey:`noc_${y}`,name:y,stroke:yearColor(y,i),strokeWidth:2,dot:false}))
          )
        )
      ),
      h('div', {style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:20}},
        h('div', {style:{fontSize:11,color:C.muted,marginBottom:12,textTransform:'uppercase',letterSpacing:'0.06em'}}, 'Top propiedades'),
        h(ResponsiveContainer, {width:'100%',height:200},
          h(BarChart, {data:byProp.slice(0,10),layout:'vertical',margin:{top:0,right:10,left:65,bottom:0}},
            h(CartesianGrid, {strokeDasharray:'3 3',stroke:C.border,horizontal:false}),
            h(XAxis, {type:'number',tick:{fill:C.muted,fontSize:9},axisLine:false,tickLine:false,tickFormatter:v=>v>=1000?`${(v/1000).toFixed(0)}k`:v}),
            h(YAxis, {type:'category',dataKey:'name',tick:{fill:C.text,fontSize:9},axisLine:false,tickLine:false,width:62}),
            h(Tooltip, {content:h(Tip)}),
            h(Bar, {dataKey:'ingresos',name:'Ingresos',fill:C.accent,radius:[0,3,3,0]})
          )
        )
      )
    ),

    // PROPIEDADES
    view==='propiedades' && h('div', {style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,overflow:'hidden'}},
      h('table', null,
        h('thead', null,
          h('tr', {style:{background:C.bg}},
            ...['Propiedad','Reservas','Noches',`Ingresos (${revLabel})`,'ADR','Ticket medio'].map(hd =>
              h('th', {key:hd, style:{padding:'10px 16px',textAlign:'left',color:C.muted,fontWeight:500,borderBottom:`1px solid ${C.border}`}}, hd)
            )
          )
        ),
        h('tbody', null,
          ...byProp.map((p,i) =>
            h('tr', {key:p.name, style:{borderBottom:`1px solid ${C.border}`,background:i%2===0?'transparent':C.bg}},
              h('td', {style:{padding:'10px 16px'}},
                h('span', {style:{display:'inline-block',width:8,height:8,borderRadius:'50%',background:getColor(p.name),marginRight:8}}),
                p.name
              ),
              h('td', {style:{padding:'10px 16px',color:C.muted}}, p.reservas),
              h('td', {style:{padding:'10px 16px',color:C.muted}}, p.noches),
              h('td', {style:{padding:'10px 16px',color:C.accent,fontFamily:'monospace',fontWeight:600}}, fmt(p.ingresos)),
              h('td', {style:{padding:'10px 16px',fontFamily:'monospace'}}, fmt(p.adr)),
              h('td', {style:{padding:'10px 16px',fontFamily:'monospace'}}, fmt(p.ingresos/p.reservas))
            )
          )
        )
      )
    ),

    // RESERVAS
    view==='reservas' && h('div', {style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,overflow:'hidden'}},
      h('table', null,
        h('thead', null,
          h('tr', {style:{background:C.bg}},
            ...['Fecha','Propiedad','Noches','Bruto','Comisión','Neto','Fuente'].map(hd =>
              h('th', {key:hd, style:{padding:'9px 14px',textAlign:'left',color:C.muted,fontWeight:500,borderBottom:`1px solid ${C.border}`}}, hd)
            )
          )
        ),
        h('tbody', null,
          ...[...filtered].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map((r,i) =>
            h('tr', {key:(r.conf||r.date+r.property)+i, style:{borderBottom:`1px solid ${C.border}`,background:i%2===0?'transparent':C.bg}},
              h('td', {style:{padding:'7px 14px',color:C.muted}}, r.date),
              h('td', {style:{padding:'7px 14px'}},
                h('span', {style:{display:'inline-block',width:6,height:6,borderRadius:'50%',background:getColor(r.property),marginRight:6}}),
                r.property
              ),
              h('td', {style:{padding:'7px 14px',color:C.muted}}, r.nights||'—'),
              h('td', {style:{padding:'7px 14px',fontFamily:'monospace'}}, fmt(r.amount)),
              h('td', {style:{padding:'7px 14px',fontFamily:'monospace',color:C.danger}}, '-'+fmt(r.commission)),
              h('td', {style:{padding:'7px 14px',fontFamily:'monospace',color:C.accent2,fontWeight:600}}, fmt(r.amount-r.commission)),
              h('td', {style:{padding:'7px 14px',color:C.muted,fontSize:10}}, r.source)
            )
          )
        )
      )
    ),

    h('div', {style:{marginTop:16,fontSize:10,color:C.muted,textAlign:'center'}},
      `365stays · ${ALL_DATA.length.toLocaleString()} reservas · ${UPDATED}`
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
